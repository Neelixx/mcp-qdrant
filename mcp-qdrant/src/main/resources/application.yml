spring:
  application:
    name: mcp-qdrant
  threads:
    virtual:
      enabled: true

server:
  port: 8080

mcp:
  qdrant:
    host: localhost
    port: 6334
    use-tls: false
    api-key: ${QDRANT_API_KEY:}
    timeout-ms: 5000
    collections:
      - vpms
      - vpmshelp
    search-limit: 10
  embedding:
    service-url: http://localhost:11434
    model: nomic-embed-text-v2-moe
    dimension: 768
    timeout-ms: 10000
    batch-size: 32
    # Collection-specific embedding models (optional)
    # For collections with different embedding models/dimensions
    # Override via env vars: MCP_EMBEDDING_COLLECTIONMODELS_<COLLECTION>_MODEL
    collection-models:
      qdrant-doc:
        model: all-minilm:l6-v2
        dimension: 384

grpc:
  server:
    port: 9091

logging:
  level:
    com.vpms.mcp.qdrant: INFO
    io.qdrant.client: WARN
