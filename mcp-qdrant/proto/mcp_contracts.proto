syntax = "proto3";

package mcp_qdrant;

option java_package = "com.copilot.mcp.qdrant.proto";
option java_multiple_files = true;

// =============================================================================
// =============================================================================
// CORE CONTRACTS (Version 0.0.2)
// =============================================================================

// --- Common Data Structures ---

message EmbeddingRequest {
  string text_chunk = 1;
  // Metadata is crucial for context retention and filtering.
  map<string, string> metadata = 2;
}

message EmbeddingResponse {
  repeated float vector = 1; // 768 dimensions as per specification
  map<string, string> metadata = 2;
}

message SearchResult {
  string source_document_id = 1;
  float similarity_score = 2;
  map<string, string> metadata = 3;
  string snippet = 4; // Context snippet returned from Qdrant
}

message SearchResponse {
  repeated SearchResult results = 1;
}

// --- Ingestion Workflow Messages ---

message IngestRequest {
    string document_id = 1;
    string content = 2; // The raw document content
    map<string, string> metadata = 3;
}

message IngestResponse {
    bool success = 1;
    string message = 2;
}

// =============================================================================
// SERVICE DEFINITIONS
// =============================================================================

// 1. Embedding Service: For converting text into vectors.
// This service abstracts the external Nomic model API call.
service EmbeddingService {
  rpc EmbedText (EmbeddingRequest) returns (EmbeddingResponse);
}

// 2. Search Service: The main entry point for all client interactions.
service SearchService {
  // HybridSearch executes the core search logic against Qdrant.
  rpc HybridSearch (SearchQueryRequest) returns (SearchResponse);

  // IngestDocument handles chunking, embedding, and indexing documents.
  rpc IngestDocument (IngestRequest) returns (IngestResponse);

  // --- Collection Management (Admin APIs) ---

  // Adds a new collection to the Qdrant cluster.
  rpc AddCollection (CollectionAddRequest) returns (OperationStatus);

  // Lists metadata for existing collections.
  rpc ListCollectionInfo (CollectionListRequest) returns (CollectionListResponse);

  // Removes a specified collection.
  rpc RemoveCollection (CollectionRemoveRequest) returns (OperationStatus);
}


// =============================================================================
// COLLECTION MANAGEMENT MESSAGES
// =============================================================================

message CollectionAddRequest {
    string collection_name = 1;
    int32 embedding_dimension = 2; // Must match the model dimension (768)
    map<string, string> initial_config = 3; // For index settings, metric, etc.
}

message CollectionListRequest {
    // Can include optional filters, e.g., only list collections tagged 'vpms'.
    map<string, string> filters = 1;
}

message CollectionListResponse {
    repeated CollectionInfo collections = 1;
}

message CollectionInfo {
    string name = 1;
    bool exists = 2;
    int32 vector_dimension = 3;
    string status = 4; // e.g., "ACTIVE", "INACTIVE"
}

message CollectionRemoveRequest {
    string collection_name = 1;
}

// --- Status and Status Operations ---

message OperationStatus {
    bool success = 1;
    string message = 2;
}

// =============================================================================
// QUERY AND CONFIGURATION PARAMETERS
// =============================================================================

message SearchQueryRequest {
  string query_text = 1;
  // General parameters for search: e.g., time window, mandatory filters.
  map<string, string> search_params = 2;
}

// Helper message to hold global configuration parameters.
message GlobalConfig {
    // Operational parameters for API calls.
    int32 default_timeout_ms = 1;
    // The identifier for the model used for embedding.
    string embedding_model_name = 2;
}
