services:
  ################################################################
  # QDRANT (Vector DB)
  ################################################################
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT_ALLOW_CORS=true
      - QDRANT_LOG_LEVEL=INFO
    networks:
      - ai-net

  ################################################################
  # OLLAMA (ROCm)
  ################################################################
  ollama:
    image: ollama/ollama:rocm
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    devices:
      - /dev/kfd
      - /dev/dri
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    networks:
      - ai-net

  
  ################################################################
  # QDRANT MCP Server
  ################################################################
  mcp-qdrant:
    build: .
    ports:
      - "8080:8080"
      - "9090:9091"
    environment:
      - MCP_QDRANT_HOST=qdrant
      - MCP_QDRANT_PORT=6334
      - MCP_QDRANT_COLLECTIONS=${MCP_QDRANT_COLLECTIONS:-all}
      - MCP_EMBEDDING_SERVICE_URL=http://ollama:11434
      - MCP_EMBEDDING_MODEL=${MCP_EMBEDDING_MODEL:-nomic-embed-text-v2-moe}
      - MCP_EMBEDDING_TIMEOUT_MS=${MCP_EMBEDDING_TIMEOUT_MS:-10000}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
    networks:
      - ai-net
    depends_on:
      - qdrant
      - ollama
    restart: unless-stopped

networks:
  ai-net:
    driver: bridge

volumes:
  qdrant_data:
  ollama_data:
